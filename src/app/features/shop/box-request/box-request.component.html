<div class="max-w-md mx-auto mt-10">
  <app-card>
    <h2 class="text-2xl font-bold mb-6 text-text-primary text-center">Request a Box</h2>
    <p class="text-text-secondary text-center mb-8">
      Ask for a new physical box location for your shop. Admin will review your request.
    </p>

    <div class="space-y-6">
      <ng-container *ngIf="(selectedShop$ | async) as shop; else noShop">
        <div class="bg-accent/5 p-4 rounded-xl border border-accent/10 mb-6">
          <p class="text-[10px] uppercase tracking-widest text-accent font-black mb-1">Selected Shop</p>
          <p class="font-bold text-text-primary">{{ shop.name }}</p>
        </div>

        <app-button (onClick)="submitRequest()" [disabled]="loading" class="w-full">
          {{ loading ? 'Sending Request...' : 'Send Box Request' }}
        </app-button>
      </ng-container>

      <ng-template #noShop>
        <div class="p-4 bg-red-50 text-red-600 rounded-xl text-center font-medium border border-red-100">
          No shop selected. Please select a shop first.
        </div>
      </ng-template>
    </div>

    <div *ngIf="successMsg" class="mt-6 p-4 bg-green-50 text-green-700 rounded-xl text-center border border-green-100 animate-in fade-in slide-in-from-bottom-2">
      <span class="mr-2">✅</span> {{ successMsg }}
    </div>

    <div *ngIf="errorMsg" class="mt-6 p-4 bg-red-50 text-red-700 rounded-xl text-center border border-red-100 animate-in fade-in slide-in-from-bottom-2">
      <span class="mr-2">❌</span> {{ errorMsg }}
    </div>
  </app-card>
</div>
