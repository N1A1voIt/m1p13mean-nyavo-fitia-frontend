<div class="space-y-8">
  <header>
    <h2 class="text-4xl font-black tracking-tight text-text-primary">One-Tap POS</h2>
    <p class="text-text-secondary font-medium mt-1">Tap a product to register a quick sale.</p>
  </header>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <app-card 
      *ngFor="let product of products" 
      [hoverable]="true"
      (click)="quickSale(product)"
      class="group relative"
      [padding]="true"
    >
      <div class="h-full flex flex-col justify-between">
        <div>
          <div class="flex justify-between items-start mb-4">
            <app-badge [variant]="(product.quantity || 0) > 0 ? 'info' : 'muted'">
              {{ (product.quantity || 0) > 0 ? product.quantity + ' left' : 'Out of Stock' }}
            </app-badge>
            <span class="text-2xl font-black text-accent">{{ product.price | currency:'EUR' }}</span>
          </div>
          <h3 class="text-xl font-bold text-text-primary group-hover:text-accent transition-colors">
            {{ product.name }}
          </h3>
        </div>
        
        <div class="mt-8 flex items-center justify-center py-4 bg-accent/5 rounded-xl border border-accent/10 group-active:scale-95 transition-all">
          <span class="font-black text-accent uppercase tracking-widest text-xs">Tap to Sell</span>
        </div>
      </div>

      <!-- Processing Overlay -->
      <div *ngIf="processingSale" class="absolute inset-0 bg-background/50 backdrop-blur-[1px] flex items-center justify-center rounded-2xl z-10">
        <div class="w-6 h-6 border-2 border-accent border-t-transparent rounded-full animate-spin"></div>
      </div>
    </app-card>
  </div>

  <div *ngIf="products.length === 0 && !loading" class="p-20 text-center">
    <p class="text-text-muted font-bold">No products available for POS. Add them in Inventory first.</p>
  </div>
</div>
