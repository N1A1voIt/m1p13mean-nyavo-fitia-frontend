<ng-container *ngIf="(selectedShop$ | async) as shop; else selector">
  <div class="min-h-screen bg-background text-text-primary flex">
    <!-- Sidebar -->
    <aside class="w-72 bg-sidebar border-r border-border p-8 flex flex-col shadow-xl">
      <div class="flex items-center gap-3 mb-10">
        <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center text-white font-bold text-xl">S</div>
        <div>
          <span class="block text-xl font-bold tracking-tight">Shop Console</span>
          <span class="block text-[10px] uppercase tracking-widest text-accent font-black">{{ shop.name }}</span>
        </div>
      </div>

      <nav class="flex-1 space-y-2">
        <button 
          (click)="setTab('inventory')" 
          class="w-full flex items-center gap-3 px-4 py-3 transition-all rounded-xl font-bold"
          [ngClass]="currentTab === 'inventory' ? 'bg-accent/10 text-accent' : 'text-text-secondary hover:bg-card'"
        >
          <span class="text-lg">📦</span> Inventory
        </button>
        <button 
          (click)="setTab('pos')" 
          class="w-full flex items-center gap-3 px-4 py-3 transition-all rounded-xl font-bold"
          [ngClass]="currentTab === 'pos' ? 'bg-accent/10 text-accent' : 'text-text-secondary hover:bg-card'"
        >
          <span class="text-lg">⚡</span> One-Tap POS
        </button>
        <button 
          (click)="setTab('orders')" 
          class="w-full flex items-center gap-3 px-4 py-3 transition-all rounded-xl font-bold"
          [ngClass]="currentTab === 'orders' ? 'bg-accent/10 text-accent' : 'text-text-secondary hover:bg-card'"
        >
          <span class="text-lg">🛍️</span> Orders Inbox
        </button>
        <button 
          (click)="setTab('movements')" 
          class="w-full flex items-center gap-3 px-4 py-3 transition-all rounded-xl font-bold"
          [ngClass]="currentTab === 'movements' ? 'bg-accent/10 text-accent' : 'text-text-secondary hover:bg-card'"
        >
          <span class="text-lg">📜</span> Stock History
        </button>
        <button 
          (click)="setTab('box-request')" 
          class="w-full flex items-center gap-3 px-4 py-3 transition-all rounded-xl font-bold"
          [ngClass]="currentTab === 'box-request' ? 'bg-accent/10 text-accent' : 'text-text-secondary hover:bg-card'"
        >
          <span class="text-lg">📦</span> Request a Box
        </button>
      </nav>

      <div class="pt-8 border-t border-border mt-auto space-y-4">
        <button 
          (click)="switchShop()" 
          class="w-full text-left px-4 py-3 text-xs font-bold text-text-muted hover:text-accent transition-colors flex items-center gap-2"
        >
          <span>🔄</span> Switch Shop
        </button>
        
        <div>
          <p class="text-[10px] font-black text-text-muted uppercase tracking-[0.2em] mb-2">Logged in as</p>
          <div class="flex items-center gap-3 p-2 bg-card/30 rounded-xl">
            <div class="w-8 h-8 rounded-full bg-accent/20 flex items-center justify-center text-accent font-bold text-xs shrink-0">
              {{ user?.name?.charAt(0) }}
            </div>
            <p class="text-sm font-bold text-text-primary truncate">{{ user?.name }}</p>
          </div>
        </div>
        
        <app-button variant="outline" (onClick)="logout()" class="w-full">
          Logout
        </app-button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-12 overflow-y-auto">
      <div [ngSwitch]="currentTab">
        <app-inventory *ngSwitchCase="'inventory'"></app-inventory>
        <app-pos *ngSwitchCase="'pos'"></app-pos>
        <app-orders-inbox *ngSwitchCase="'orders'"></app-orders-inbox>
        <app-stock-movements *ngSwitchCase="'movements'"></app-stock-movements>
        <app-box-request *ngSwitchCase="'box-request'"></app-box-request>
      </div>
    </main>
  </div>
</ng-container>

<ng-template #selector>
  <app-shop-list></app-shop-list>
</ng-template>
