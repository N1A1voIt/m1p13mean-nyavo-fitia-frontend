<div class="flex justify-between items-center mb-8">
  <h1 class="text-4xl font-bold font-display text-gray-900 tracking-tight">Utility Management</h1>
  <button 
    (click)="generateInvoices()"
    class="px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 hover:shadow-indigo-200 transition-all active:scale-95"
  >
    Process Monthly Billing
  </button>
</div>

<div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
  <div class="lg:col-span-2 glass p-8 bg-white border-gray-100 shadow-sm">
    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-8">New Meter Reading</h3>
    <form (submit)="submitReading()" class="space-y-6">
      <div>
        <label class="block text-[10px] uppercase font-bold text-gray-400 tracking-wider mb-2">Target Box</label>
        <select 
          [(ngModel)]="selectedBoxId" 
          name="boxId" 
          required
          class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none italic"
        >
          <option value="" disabled>Select a box...</option>
          <option *ngFor="let box of boxes" [value]="box._id">Box {{ box.boxNumber }} ({{ box.location.zone }})</option>
        </select>
      </div>
      
      <div>
        <label class="block text-[10px] uppercase font-bold text-gray-400 tracking-wider mb-2">Utility Type</label>
        <div class="grid grid-cols-2 gap-4">
          <button 
            type="button" 
            (click)="readingType = 'Electric'"
            [class.bg-indigo-600]="readingType === 'Electric'"
            [class.text-white]="readingType === 'Electric'"
            [class.border-transparent]="readingType === 'Electric'"
            class="p-4 border border-gray-100 rounded-xl font-bold text-sm transition-all hover:border-indigo-200"
          >
            <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Electric (Jiro)
          </button>
          <button 
            type="button" 
            (click)="readingType = 'Water'"
            [class.bg-blue-600]="readingType === 'Water'"
            [class.text-white]="readingType === 'Water'"
            [class.border-transparent]="readingType === 'Water'"
            class="p-4 border border-gray-100 rounded-xl font-bold text-sm transition-all hover:border-blue-200"
          >
            <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Water (Rano)
          </button>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-[10px] uppercase font-bold text-gray-400 tracking-wider mb-2">Previous Index</label>
          <input type="number" [(ngModel)]="prevIndex" name="prev" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-[10px] uppercase font-bold text-gray-400 tracking-wider mb-2">Current Index</label>
          <input type="number" [(ngModel)]="currIndex" name="curr" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none focus:border-indigo-500">
        </div>
      </div>

      <button type="submit" class="w-full py-4 bg-gray-900 text-white font-bold rounded-xl hover:bg-black transition-all active:scale-[0.98] mt-4 shadow-xl shadow-gray-200">
        Record Index Reading
      </button>
    </form>
  </div>

  <div class="lg:col-span-3 glass p-8 bg-white border-gray-100 shadow-sm">
    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-8">Recent Activities</h3>
    <div class="space-y-4">
      <div *ngFor="let r of recentReadings" class="p-6 border border-gray-50 rounded-2xl flex items-center gap-6 hover:bg-gray-50 transition-colors group">
        <div 
          class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl"
          [ngClass]="r.type === 'Electric' ? 'bg-amber-50 text-amber-600' : 'bg-blue-50 text-blue-600'"
        >
          <ng-container *ngIf="r.type === 'Electric'"><svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></ng-container>
          <ng-container *ngIf="r.type !== 'Electric'"><svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></ng-container>
        </div>
        <div class="flex-grow">
          <p class="font-black text-gray-900">Box {{ r.boxId?.boxNumber }}</p>
          <p class="text-xs text-gray-400 font-medium">{{ r.readingDate | date:'mediumDate' }} • Index {{ r.currentIndex }}</p>
        </div>
        <div class="text-right">
          <p class="text-lg font-black font-display text-gray-900">{{ r.consumption }} <span class="text-[10px] text-gray-400 uppercase tracking-tighter">Units</span></p>
          <span 
            class="px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest inline-block"
            [ngClass]="r.invoiceStatus === 'Invoiced' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
          >
            {{ r.invoiceStatus }}
          </span>
        </div>
      </div>
      
      <div *ngIf="recentReadings.length === 0" class="py-20 text-center">
         <p class="text-gray-300 italic">No readings recorded today</p>
      </div>
    </div>
  </div>
</div>
