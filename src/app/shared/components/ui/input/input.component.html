<div class="space-y-2">
  <label *ngIf="label" [for]="id" class="block text-sm font-medium text-text-secondary">
    {{ label }}
  </label>
  <input
    [id]="id"
    [type]="type"
    [placeholder]="placeholder"
    [(ngModel)]="value"
    (ngModelChange)="onChange($event)"
    (blur)="onTouched()"
    [required]="required"
    class="w-full px-4 py-3 bg-card border border-border rounded-xl text-text-primary placeholder:text-text-muted focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none"
  >
</div>
