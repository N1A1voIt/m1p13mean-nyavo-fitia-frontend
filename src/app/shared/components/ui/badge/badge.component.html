<span [ngClass]="[
  'text-xs font-bold px-2.5 py-1 rounded-lg uppercase tracking-wider inline-flex items-center',
  variant === 'success' ? 'bg-accent/10 text-accent' : '',
  variant === 'info' ? 'bg-accent-secondary/10 text-accent-secondary' : '',
  variant === 'muted' ? 'bg-card text-text-muted border border-border' : ''
]">
  <ng-content></ng-content>
</span>
