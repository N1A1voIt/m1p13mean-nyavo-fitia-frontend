<button
  [type]="type"
  [disabled]="disabled || loading"
  (click)="onClick.emit($event)"
  [ngClass]="[
    'w-full py-3 px-4 rounded-xl font-semibold transition-all active:scale-[0.98] flex items-center justify-center gap-2',
    variant === 'primary' ? 'bg-accent text-white shadow-lg shadow-accent/20 hover:bg-opacity-90' : '',
    variant === 'outline' ? 'bg-transparent border border-border text-text-primary hover:bg-card' : '',
    disabled || loading ? 'opacity-50 cursor-not-allowed active:scale-100' : ''
  ]"
>
  <div *ngIf="loading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
  <ng-content *ngIf="!loading"></ng-content>
</button>
