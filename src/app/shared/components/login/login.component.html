<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-card p-8 rounded-2xl border border-border shadow-2xl backdrop-blur-sm">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-text-primary tracking-tight">Welcome Back</h1>
      <p class="text-text-secondary mt-2">Log in to your account to continue</p>
    </div>
    
    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="space-y-6">
      <div class="space-y-2">
        <label for="email" class="block text-sm font-medium text-text-secondary">Email</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email" 
          required 
          placeholder="name@example.com"
          class="w-full px-4 py-3 bg-card border border-border rounded-xl text-text-primary placeholder:text-text-muted focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none"
        >
      </div>
      
      <div class="space-y-2">
        <label for="password" class="block text-sm font-medium text-text-secondary">Password</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password" 
          required 
          placeholder="••••••••"
          class="w-full px-4 py-3 bg-card border border-border rounded-xl text-text-primary placeholder:text-text-muted focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none"
        >
      </div>
      
      <button 
        type="submit" 
        class="w-full py-3 px-4 bg-accent hover:bg-opacity-90 text-white font-semibold rounded-xl shadow-lg shadow-accent/20 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Log In</span>
        <div *ngIf="loading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
      </button>
    </form>
    
    <div class="relative my-8 text-center">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-border"></div>
      </div>
      <span class="relative px-4 bg-card text-sm text-text-muted">OR</span>
    </div>
    
    <button 
      (click)="onGoogleLogin()" 
      class="w-full py-3 px-4 bg-transparent border border-border hover:bg-border rounded-xl text-text-primary font-medium transition-all flex items-center justify-center gap-3 active:scale-[0.98]"
    >
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
      Sign In with Google
    </button>
    
    <p class="mt-8 text-center text-text-secondary">
      Don't have an account? 
      <a routerLink="/register" class="text-accent font-semibold hover:underline">Register here</a>
    </p>
  </div>
</div>
