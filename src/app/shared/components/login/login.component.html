<div class="min-h-screen flex items-center justify-center p-4">
  <app-card class="w-full max-w-md" [padding]="true">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-text-primary tracking-tight">Welcome Back</h1>
      <p class="text-text-secondary mt-2">Log in to your account to continue</p>
    </div>
    
    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="space-y-6">
      <app-input
        id="email"
        label="Email"
        type="email"
        placeholder="name@example.com"
        [(ngModel)]="email"
        name="email"
        [required]="true"
      ></app-input>
      
      <app-input
        id="password"
        label="Password"
        type="password"
        placeholder="••••••••"
        [(ngModel)]="password"
        name="password"
        [required]="true"
      ></app-input>
      
      <br>
      <app-button type="submit" [loading]="loading">
        Log In
      </app-button>
    </form>
    
    <div class="relative my-8 text-center">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-border"></div>
      </div>
      <span class="relative px-4 bg-card text-sm text-text-muted">OR</span>
    </div>
    
    <app-button variant="outline" (onClick)="onGoogleLogin()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
      Sign In with Google
    </app-button>
    
    <p class="mt-8 text-center text-text-secondary">
      Don't have an account? 
      <a routerLink="/register" class="text-accent font-semibold hover:underline">Register here</a>
    </p>
  </app-card>
</div>
