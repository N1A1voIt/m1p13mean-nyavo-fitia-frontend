<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-card p-8 rounded-2xl border border-border shadow-2xl backdrop-blur-sm">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-text-primary tracking-tight">Almost There!</h1>
      <p class="text-text-secondary mt-2">Just a few more details to complete your profile</p>
    </div>
    
    <div class="flex bg-background/50 p-1 rounded-xl mb-8 border border-border">
      <button 
        [class]="'flex-1 py-2 text-sm font-semibold rounded-lg transition-all ' + (role === 'user' ? 'bg-accent text-white shadow-md' : 'text-text-secondary hover:text-text-primary')"
        (click)="role = 'user'"
      >
        Customer
      </button>
      <button 
        [class]="'flex-1 py-2 text-sm font-semibold rounded-lg transition-all ' + (role === 'shop' ? 'bg-accent text-white shadow-md' : 'text-text-secondary hover:text-text-primary')"
        (click)="role = 'shop'"
      >
        Shop Owner
      </button>
    </div>

    <form (ngSubmit)="onComplete()" #completeForm="ngForm" class="space-y-6">
      <div class="space-y-2">
        <label for="name" class="block text-sm font-medium text-text-secondary">Full Name</label>
        <input 
          type="text" 
          id="name" 
          [(ngModel)]="name" 
          name="name" 
          required 
          placeholder="John Doe"
          class="w-full px-4 py-3 bg-card border border-border rounded-xl text-text-primary placeholder:text-text-muted focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none"
        >
      </div>

      <div class="space-y-2">
        <label for="username" class="block text-sm font-medium text-text-secondary">Pick a Username</label>
        <input 
          type="text" 
          id="username" 
          [(ngModel)]="username" 
          name="username" 
          required 
          placeholder="unique_username"
          class="w-full px-4 py-3 bg-card border border-border rounded-xl text-text-primary placeholder:text-text-muted focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none"
        >
      </div>

      <div class="space-y-2 transition-all duration-300" *ngIf="role === 'shop'">
        <label for="shopName" class="block text-sm font-medium text-text-secondary">Shop Name</label>
        <input 
          type="text" 
          id="shopName" 
          [(ngModel)]="shopName" 
          name="shopName" 
          required 
          placeholder="My Awesome Store"
          class="w-full px-4 py-3 bg-card border border-border rounded-xl text-text-primary placeholder:text-text-muted focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none"
        >
      </div>
      
      <button 
        type="submit" 
        class="w-full py-3 px-4 bg-accent hover:bg-opacity-90 text-white font-semibold rounded-xl shadow-lg shadow-accent/20 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center mt-2"
        [disabled]="loading || !completeForm.valid"
      >
        <span *ngIf="!loading">Finish Registration</span>
        <div *ngIf="loading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
      </button>
    </form>
  </div>
</div>
