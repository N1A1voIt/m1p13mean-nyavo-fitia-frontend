<div class="h-screen flex flex-col overflow-hidden bg-white">
  <header class="px-6 py-4 flex justify-between items-center bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm sticky top-0 z-20">
    <h1 class="text-2xl font-bold font-display text-gray-900 flex items-center gap-2">
      Maal<span class="text-blue-600 font-light">Experience</span>
    </h1>
    <div class="flex items-center gap-4">
       <button class="w-10 h-10 rounded-full flex items-center justify-center bg-gray-50 hover:bg-gray-100 transition-colors text-gray-500" routerLink="/">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
       </button>
       <button (click)="logout()" class="w-10 h-10 rounded-full flex items-center justify-center text-red-500 bg-red-50 hover:bg-red-100 transition-colors">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
       </button>
    </div>
  </header>
  
  <main class="flex-grow overflow-y-auto pb-24 bg-gray-50/30">
    <router-outlet></router-outlet>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 grid grid-cols-4 items-center z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
    <a routerLink="/mall/map" routerLinkActive="active" class="client-nav-link text-gray-500 hover:text-blue-600 transition-colors flex flex-col items-center justify-center h-full pt-2">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
      <span class="text-[10px] uppercase font-bold tracking-wider">Map</span>
    </a>
    <a routerLink="/mall/marketplace" routerLinkActive="active" class="client-nav-link text-gray-500 hover:text-blue-600 transition-colors flex flex-col items-center justify-center h-full pt-2">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
      <span class="text-[10px] uppercase font-bold tracking-wider">Market</span>
    </a>
    <a routerLink="/mall/loyalty" routerLinkActive="active" class="client-nav-link text-gray-500 hover:text-blue-600 transition-colors flex flex-col items-center justify-center h-full pt-2">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
      <span class="text-[10px] uppercase font-bold tracking-wider">Loyalty</span>
    </a>
    <a routerLink="/mall/reservations" routerLinkActive="active" class="client-nav-link text-gray-500 hover:text-blue-600 transition-colors flex flex-col items-center justify-center h-full pt-2">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      <span class="text-[10px] uppercase font-bold tracking-wider">Booking</span>
    </a>
  </nav>
</div>
